loki:
  auth_enabled: false

  server:
    http_listen_port: 3100
    grpc_listen_port: 9096

  common:
    path_prefix: /loki
    replication_factor: 1
    storage:
      bucket_names:
        chunks: cloudnotes-loki-chunks
        ruler: cloudnotes-loki-ruler
        admin: cloudnotes-loki-admin
      type: s3
      s3:
        endpoint: s3.amazonaws.com
        region: us-east-1
        bucketnames: cloudnotes-loki
        s3forcepathstyle: false

  schema_config:
    configs:
      - from: 2023-01-01
        store: boltdb-shipper
        object_store: s3
        schema: v11
        index:
          prefix: loki_index_
          period: 24h

  limits_config:
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    ingestion_rate_mb: 50
    ingestion_burst_size_mb: 100

  memberlist:
    join_members:
      - loki-memberlist

write:
  replicas: 1

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 1Gi

read:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

backend:
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

gateway:
  enabled: true

  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 256Mi

  nginxConfig:
    server:
      listen: 8080
    commonMiddleware:
      - pathPrefix
    customMiddleware: []

promtail:
  enabled: true

  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      cpu: 100m
      memory: 256Mi

  config:
    clients:
      - url: http://loki-gateway/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes
        static_configs:
          - targets:
              - localhost

    serviceDiscoverConfig:
      enabled: true
      labels_to_drop:
        - container

minio:
  enabled: false

fluent-bit:
  enabled: false

grafana-loki:
  enabled: false