global:
  prometheus:
    external_labels:
      cluster: 'cloudnotes-eks'
      environment: 'dev'

prometheus:
  prometheusSpec:
    retention: 30d
    retentionSize: 50GB
    replicaExternalLabelName: 'replica'
    externalLabels:
      environment: 'dev'

    ruleSelector:
      matchLabels:
        prometheus: cloudnotes

    serviceMonitorSelector:
      matchLabels:
        team: cloudnotes

    resources:
      requests:
        cpu: 200m
        memory: 2Gi
      limits:
        cpu: 1000m
        memory: 4Gi

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: gp3
          resources:
            requests:
              storage: 50Gi

    enableAdminAPI: false

    thanos:
      image:
        tag: v0.32.0
      externalLabels:
        cluster: 'cloudnotes-eks'

alertmanager:
  alertmanagerSpec:
    replicas: 1

    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        cpu: 200m
        memory: 512Mi

    config:
      global:
        resolve_timeout: 5m
        slack_api_url: '${SLACK_WEBHOOK_URL}'
      route:
        group_by: ['alertname', 'cluster', 'service']
        group_wait: 10s
        group_interval: 10s
        repeat_interval: 12h
        receiver: 'default'
        routes:
          - match:
              severity: critical
            receiver: 'critical-alerts'
            continue: true
          - match:
              severity: warning
            receiver: 'warning-alerts'
      receivers:
        - name: 'default'
          slack_configs:
            - channel: '#cloudnotes-alerts'
              send_resolved: true
        - name: 'critical-alerts'
          slack_configs:
            - channel: '#cloudnotes-critical'
              send_resolved: true
        - name: 'warning-alerts'
          slack_configs:
            - channel: '#cloudnotes-warning'
              send_resolved: true

nodeExporter:
  enabled: true

kubeStateMetrics:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi

pushgateway:
  enabled: true
  resources:
    requests:
      cpu: 25m
      memory: 64Mi

grafana:
  enabled: true
  replicas: 1

  adminUser: admin
  adminPassword: '${GRAFANA_ADMIN_PASSWORD}'

  persistence:
    enabled: true
    storageClassName: gp3
    size: 10Gi

  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 200m
      memory: 512Mi

  grafana.ini:
    server:
      root_url: https://grafana.cloudnotes.dev
    auth.anonymous:
      enabled: false
    users:
      allow_sign_up: false

  dashboards:
    default:
      kubernetes-cluster:
        url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/jsonnet/kube-prometheus/eks.example.com/grafana-dashboards/k8s-resources-cluster.json
      kubernetes-pods:
        url: https://raw.githubusercontent.com/prometheus-operator/kube-prometheus/main/jsonnet/kube-prometheus/eks.example.com/grafana-dashboards/k8s-resources-pod.json

prometheusOperator:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus-node-exporter:
  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 50m
      memory: 128Mi

alertmanager:
  enabled: true

kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kube-etcd:
  enabled: false