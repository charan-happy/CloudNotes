---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: auth-service
  namespace: argocd
  labels:
    app.kubernetes.io/name: auth-service
    app.kubernetes.io/part-of: cloudnotes
spec:
  project: default
  source:
    repoURL: https://github.com/charan-happy/CloudNotes.git
    targetRevision: main
    path: kubernetes/services/auth-service
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
